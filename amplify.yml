version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
        - ls -la dist/ || echo "dist directory not found"
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_nodes/**/*
  env:
    variables:
      VITE_SITE_URL: https://epmartins.com.br
